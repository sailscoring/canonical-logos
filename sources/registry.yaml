# registry.yaml — the canonical logo set
#
# This is the curation decision: the hand-maintained list of entities whose
# logos ship in the built-in canonical library. The pipeline (scripts/) fetches,
# normalises, and builds a manifest from this file — adding a logo is editing
# this file and re-running. The canonical set is a human decision, not a scrape.
#
# An entity earns a place here if it is BOTH:
#   - stable & identifiable (one durable identity referenced over years), and
#   - broadly reused (referenced across many events/workspaces).
# Ephemeral, one-off artwork (year-stamped event banners, purely local backers)
# belongs in a scorer's per-workspace library, not here.
#
# Each entry:
#   id          stable kebab-case key; the app references this. Unique.
#   class       governing-body | sailing-club | class-assoc | sponsor | venue | regatta
#               (sailing-club is the club; venue is a non-club racing location —
#                a club is often the venue, but the scorer picks the club logo)
#   displayName human-readable name shown in the picker
#   source      human-facing provenance page (brand portal / page / contact)
#   sourceKind  brand-portal | direct | wikimedia
#   assetUrl    optional: direct link to the official file — an http(s) URL, or a
#               repo-relative path (e.g. sources/assets/<id>.svg) for an asset an
#               owner sent directly. Without it, the entry is recorded as
#               unresolved ("not yet sourced") rather than fetched.
#   licence     optional: a real free licence (e.g. Wikimedia), if any
#   attribution optional: required when `licence` is set and not public-domain/CC0
#   usageNote   optional: any terms the owner published or offered (recorded, not a gate)
#   quality     optional: "ok" (default) or "provisional" — a sub-par asset kept
#               deliberately because it is the best available; flagged for upgrade
#   qualityNote required when quality is "provisional": the limitation + what's wanted
#   home        optional: homepage to scrape for a logo (scripts/05_scout.py);
#               defaults to the domain of `source`
#   candidateUrls optional: list of URLs for the scout to consider as candidates
#   note        optional: anything else a maintainer should know (variants, etc.)
#
# Initial set. The full sourcing backlog (clubs, classes, sponsors) is tracked
# as a checklist in the canonical-logos GitHub issue. `source` URLs here are
# provenance pointers to refine when each asset is sourced; no assetUrls yet, so
# every entry currently resolves to "not yet sourced" until its asset is added.

