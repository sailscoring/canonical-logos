# registry.yaml — the canonical logo set
#
# This is the curation decision: the hand-maintained list of entities whose
# logos ship in the built-in canonical library. The pipeline (scripts/) fetches,
# normalises, and builds a manifest from this file — adding a logo is editing
# this file and re-running. The canonical set is a human decision, not a scrape.
#
# An entity earns a place here if it is BOTH:
#   - stable & identifiable (one durable identity referenced over years), and
#   - broadly reused (referenced across many events/workspaces).
# Ephemeral, one-off artwork (year-stamped event banners, purely local backers)
# belongs in a scorer's per-workspace library, not here.
#
# Each entry:
#   id          stable kebab-case key; the app references this. Unique.
#   class       governing-body | sailing-club | class-assoc | sponsor | venue
#               (sailing-club is the club; venue is a non-club racing location —
#                a club is often the venue, but the scorer picks the club logo)
#   displayName human-readable name shown in the picker
#   source      human-facing provenance page (brand portal / page / contact)
#   sourceKind  brand-portal | direct | wikimedia
#   assetUrl    optional: direct link to the official file — an http(s) URL, or a
#               repo-relative path (e.g. sources/assets/<id>.svg) for an asset an
#               owner sent directly. Without it, the entry is recorded as
#               unresolved ("not yet sourced") rather than fetched.
#   licence     optional: a real free licence (e.g. Wikimedia), if any
#   attribution optional: required when `licence` is set and not public-domain/CC0
#   usageNote   optional: any terms the owner published or offered (recorded, not a gate)
#   quality     optional: "ok" (default) or "provisional" — a sub-par asset kept
#               deliberately because it is the best available; flagged for upgrade
#   qualityNote required when quality is "provisional": the limitation + what's wanted
#   note        optional: anything else a maintainer should know (variants, etc.)
#
# Initial set. The full sourcing backlog (clubs, classes, sponsors) is tracked
# as a checklist in the canonical-logos GitHub issue. `source` URLs here are
# provenance pointers to refine when each asset is sourced; no assetUrls yet, so
# every entry currently resolves to "not yet sourced" until its asset is added.

logos:
  # --- Governing bodies -----------------------------------------------------
  - id: world-sailing
    class: governing-body
    displayName: World Sailing
    source: https://media.sailing.org/sailing/wp-content/uploads/2021/04/16100142/World-Sailing-Logo-2016.svg
    sourceKind: brand-portal
    assetUrl: sources/assets/world-sailing.svg

  - id: irish-sailing
    class: governing-body
    displayName: Irish Sailing
    source: https://www.sailing.ie/
    sourceKind: brand-portal
    assetUrl: sources/assets/irish-sailing.png

  # --- Sailing clubs --------------------------------------------------------
  - id: hyc
    class: sailing-club
    displayName: Howth Yacht Club
    source: https://www.hyc.ie/system/files/7225/original/hyc-logo-new.png
    sourceKind: brand-portal
    assetUrl: sources/assets/hyc.png
    note: Modernised HYC logo, the version the club uses on its own results.
      High-res transparent PNG.

  - id: dbsc
    class: sailing-club
    displayName: Dublin Bay Sailing Club
    source: https://dbsc.ie/wp-content/uploads/2021/03/Official-DBSC-Logo-high1-e1676634995134.png
    sourceKind: brand-portal
    assetUrl: sources/assets/dbsc.png

  # --- Class associations ---------------------------------------------------
  - id: ilca
    class: class-assoc
    displayName: International Laser Class Association (ILCA)
    source: https://commons.wikimedia.org/wiki/File:ILCA_class_association_logo.svg
    sourceKind: wikimedia
    assetUrl: sources/assets/ilca.svg
    licence: Public domain
    attribution: ILCA class association

  - id: iodai
    class: class-assoc
    displayName: Irish Optimist Dinghy Association (IODAI)
    source: https://www.optimist.ie/
    sourceKind: brand-portal

  - id: gp14
    class: class-assoc
    displayName: GP14
    source: https://commons.wikimedia.org/wiki/File:GP14.svg
    sourceKind: wikimedia
    assetUrl: sources/assets/gp14.svg
    licence: Public domain
    attribution: Alexx.net (Wikimedia Commons)

  - id: fireball
    class: class-assoc
    displayName: Fireball
    source: https://hyc.ie/system/sponsor_logos/597/normal/FB_Ireland_Good.jpg
    sourceKind: brand-portal
    assetUrl: sources/assets/fireball.jpg
    quality: provisional
    qualityNote: 266x214 JPEG on white, no transparency — the best the class
      could supply (International's site logo is a tiny 99px palette PNG;
      Fireball Ireland's other mark is a favicon crop). Replace if Fireball
      Ireland issues a clean, higher-res or transparent logo.

  - id: howth-17
    class: class-assoc
    displayName: Howth Seventeen Footer
    source: https://hyc.ie/system/sponsor_logos/451/normal/small-125-1-red.png
    sourceKind: brand-portal
    assetUrl: sources/assets/howth-17.png
    note: HYC-hosted; the Howth 17 class is based at HYC. Red "17" insignia,
      transparent PNG.

  - id: melges-15
    class: class-assoc
    displayName: Melges 15
    source: https://melges15.com/cdn/shop/files/Melges15-Horizontal-RabbitEars.png
    sourceKind: brand-portal
    assetUrl: sources/assets/melges-15.png

  # --- Sponsors -------------------------------------------------------------
  # A sponsor earns canonical status only when it recurs across events; a
  # one-off event backer belongs in the per-workspace library.
  - id: aib
    class: sponsor
    displayName: AIB
    source: https://aib.ie/content/dam/frontdoor/aib-logo@2x.png
    sourceKind: brand-portal
    assetUrl: sources/assets/aib.png
    note: AIB's own og:image. RGB on white (no transparency).

  - id: provident
    class: sponsor
    displayName: Provident
    source: https://www.providentcrm.com/wp-content/uploads/2022/10/Provident_Navy_Orange-1-1.png
    sourceKind: brand-portal
    assetUrl: sources/assets/provident.png

# Entities that have asked not to be hosted, or whose published terms forbid
# third-party hosting. Never fetched or shipped, even if listed above. Removals
# from the live set are recorded here with a date and reason.
denylist: []
