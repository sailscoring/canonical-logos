name: rebuild

# Periodic refresh of the canonical assets from their upstream sources
# (scoping note §9). Unlike national-letters, there is no authoritative list to
# re-extract — the canonical set is the hand-maintained registry.yaml — so this
# only re-fetches the assets already listed and flags any that changed upstream.
# Logo "drift" is a brand change, which is rare, so the cadence is light.

on:
  schedule:
    - cron: "0 4 1 */3 *"  # 04:00 UTC on the 1st, quarterly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync deps
        run: uv sync

      - name: Install SVGO
        run: npm install -g svgo  # 02_normalise.py uses `npx --no-install svgo`

      - name: Fetch assets
        run: uv run python scripts/01_fetch.py

      - name: Normalise
        run: uv run python scripts/02_normalise.py

      - name: Build manifest
        run: uv run python scripts/03_manifest.py

      - name: Validate
        run: uv run python scripts/04_validate.py

      - name: Tests
        run: uv run pytest -q

      # Ignore the always-moving timestamps: only open a PR when the dataset
      # changed semantically (a logo file, or a non-timestamp manifest field).
      - name: Detect semantic changes
        id: diff
        run: |
          python <<'EOF'
          import hashlib, json, os, subprocess
          from pathlib import Path

          PATHS = ["data/manifest.json", "data/unresolved.json", "data/provenance.json"]
          TIMESTAMP_KEYS = {"generatedAt", "retrievedAt"}

          def strip(obj):
              if isinstance(obj, dict):
                  return {k: strip(v) for k, v in obj.items() if k not in TIMESTAMP_KEYS}
              if isinstance(obj, list):
                  return [strip(x) for x in obj]
              return obj

          def stable(raw):
              return hashlib.sha256(
                  json.dumps(strip(json.loads(raw)), sort_keys=True, ensure_ascii=False).encode()
              ).hexdigest()

          def now_hash(path):
              return stable(Path(path).read_bytes()) if Path(path).is_file() else "missing"

          def head_hash(path):
              try:
                  return stable(subprocess.check_output(["git", "show", f"HEAD:{path}"]))
              except subprocess.CalledProcessError:
                  return "missing"

          json_diff = any(head_hash(p) != now_hash(p) for p in PATHS)
          logo_diff = subprocess.run(
              ["git", "diff", "--quiet", "HEAD", "--", "logos/"], check=False
          ).returncode != 0
          changed = json_diff or logo_diff
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"changed={'true' if changed else 'false'}\n")
          EOF

      - name: Create PR if anything diverged
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "rebuild: refresh canonical logos from upstream"
          branch: bot/rebuild
          delete-branch: true
          title: "Quarterly rebuild: upstream logos diverged"
          body: |
            Automated rebuild from `.github/workflows/rebuild.yml`.

            An upstream logo has changed since the last commit. Review the diff
            in `data/` / `logos/`, confirm the new artwork is the official mark
            (and not, say, a placeholder or an outage page), and merge to publish.

            Run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            automated
            data-refresh

      - name: Note no change
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes — skipping PR."
