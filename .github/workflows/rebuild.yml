name: rebuild

# Periodic refresh of the canonical assets from their upstream sources
# Unlike national-letters, there is no authoritative list to
# re-extract — the canonical set is the hand-maintained registry.yaml — so this
# only re-fetches the assets already listed and flags any that changed upstream.
# Logo "drift" is a brand change, which is rare, so the cadence is light.

on:
  schedule:
    - cron: "0 4 1 */3 *"  # 04:00 UTC on the 1st, quarterly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Sync deps
        run: uv sync

      - name: Install SVGO
        run: npm install -g svgo  # 02_normalise.py uses `npx --no-install svgo`

      - name: Fetch assets
        run: uv run python scripts/01_fetch.py

      - name: Normalise
        run: uv run python scripts/02_normalise.py

      - name: Build manifest
        run: uv run python scripts/03_manifest.py

      - name: Validate
        run: uv run python scripts/04_validate.py

      - name: Tests
        run: uv run pytest -q

      # Only open a PR on a *real* upstream change. The re-fetch/normalise
      # toolchain (Pillow/zlib, SVGO) can re-encode an unchanged asset to
      # byte-different output — a PNG whose pixels are identical, just packed
      # differently — and the manifest carries a byte-derived sha256 plus moving
      # timestamps for every entry. Comparing raw bytes/hashes trips on that
      # noise every run (see the 2026-07 run that flagged all 52 logos, all
      # pixel-identical). So: decode PNGs and compare *pixels*, byte-compare
      # SVGs, and ignore timestamps + sha256 in the JSON. Structural manifest
      # changes (added/removed entry, new source or quality flag) still survive.
      - name: Detect semantic changes
        id: diff
        run: |
          uv run python <<'EOF'
          import io, json, os, subprocess
          from pathlib import Path
          from PIL import Image, ImageChops

          JSON_PATHS = ["data/manifest.json", "data/unresolved.json", "data/provenance.json"]
          IGNORE_KEYS = {"generatedAt", "retrievedAt", "sha256"}

          def strip(obj):
              if isinstance(obj, dict):
                  return {k: strip(v) for k, v in obj.items() if k not in IGNORE_KEYS}
              if isinstance(obj, list):
                  return [strip(x) for x in obj]
              return obj

          def canon(raw):
              return json.dumps(strip(json.loads(raw)), sort_keys=True, ensure_ascii=False)

          def head_bytes(path):
              try:
                  return subprocess.check_output(
                      ["git", "show", f"HEAD:{path}"], stderr=subprocess.DEVNULL)
              except subprocess.CalledProcessError:
                  return None

          json_changed = []
          for p in JSON_PATHS:
              now = Path(p).read_bytes() if Path(p).is_file() else None
              old = head_bytes(p)
              if (canon(now) if now is not None else None) != (canon(old) if old is not None else None):
                  json_changed.append(p)

          def pixels_differ(path):
              old = head_bytes(path)
              new = Path(path).read_bytes() if Path(path).is_file() else None
              if (old is None) != (new is None):
                  return True  # asset added or removed
              a = Image.open(io.BytesIO(old)).convert("RGBA")
              b = Image.open(io.BytesIO(new)).convert("RGBA")
              if a.size != b.size:
                  return True
              # NB: don't use ImageChops.difference(...).getbbox() — on RGBA it
              # defaults to alpha_only=True (Pillow >=11), so a pure recolour
              # (RGB changes, alpha unchanged) reads as "no difference". Check
              # every channel's extrema instead.
              extrema = ImageChops.difference(a, b).getextrema()
              return any(hi > 0 for _lo, hi in extrema)

          asset_changed = []
          for f in subprocess.check_output(
                  ["git", "diff", "--name-only", "HEAD", "--", "logos/"], text=True).split():
              if f.endswith(".html"):
                  continue  # generated landing page; only its timestamp line moves
              if f.endswith(".png"):
                  if pixels_differ(f):
                      asset_changed.append(f)
              else:
                  asset_changed.append(f)  # SVG or anything else: a byte diff is real

          changed = bool(json_changed or asset_changed)
          print("structural JSON changes:", json_changed or "none")
          print("visual/asset changes:  ", asset_changed or "none")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"changed={'true' if changed else 'false'}\n")
          EOF

      - name: Create PR if anything diverged
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "rebuild: refresh canonical logos from upstream"
          branch: bot/rebuild
          delete-branch: true
          title: "Quarterly rebuild: upstream logos diverged"
          body: |
            Automated rebuild from `.github/workflows/rebuild.yml`.

            An upstream logo has changed since the last commit. Review the diff
            in `data/` / `logos/`, confirm the new artwork is the official mark
            (and not, say, a placeholder or an outage page), and merge to publish.

            Run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            automated
            data-refresh

      - name: Note no change
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes — skipping PR."
